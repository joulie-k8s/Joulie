baseURL: https://matbun.github.io/joulie/
languageCode: en-us
title: Joulie
contentDir: content/en
enableRobotsTXT: true

module:
  imports:
    - path: github.com/google/docsy
    - path: github.com/google/docsy/dependencies

params:
  github_repo: https://github.com/matbun/joulie
  github_project_repo: https://github.com/matbun/joulie
  offlineSearch: true

  ui:
    sidebar_menu_compact: true
    sidebar_menu_foldable: true
    showLightDarkModeMenu: true

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Docs
      url: /docs/
      weight: 10
    - name: Examples
      url: https://github.com/matbun/joulie/tree/main/examples
      weight: 20
    - name: Experiments
      url: https://github.com/matbun/joulie/tree/main/experiments
      weight: 30
    - name: GitHub
      url: https://github.com/matbun/joulie
      weight: 40
