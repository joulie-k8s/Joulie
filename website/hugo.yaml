baseURL: https://joulie-k8s.github.io/Joulie/
languageCode: en-us
title: Joulie
contentDir: content/en
enableRobotsTXT: true

module:
  imports:
    - path: github.com/google/docsy
    - path: github.com/google/docsy/dependencies

params:
  github_repo: https://github.com/joulie-k8s/Joulie
  github_project_repo: https://github.com/joulie-k8s/Joulie
  offlineSearch: true
  copyright: "Joulie Authors"
  version_menu: "Version"
  versions:
    - version: "stable"
      url: "/Joulie/stable/"
    - version: "main"
      url: "/Joulie/main/"

  links:
    user:
      - name: GitHub
        url: https://github.com/joulie-k8s/Joulie
        icon: fab fa-github
        desc: Source code and issues

  ui:
    sidebar_menu_compact: true
    sidebar_menu_foldable: true
    showLightDarkModeMenu: true

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - name: Docs
      url: /docs/
      weight: 10
    - name: Examples
      url: https://github.com/joulie-k8s/Joulie/tree/main/examples
      weight: 20
    - name: Experiments
      url: https://github.com/joulie-k8s/Joulie/tree/main/experiments
      weight: 30
    - name: GitHub
      url: https://github.com/joulie-k8s/Joulie
      weight: 40
