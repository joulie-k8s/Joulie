apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: telemetryprofiles.joulie.io
spec:
  group: joulie.io
  names:
    kind: TelemetryProfile
    listKind: TelemetryProfileList
    plural: telemetryprofiles
    singular: telemetryprofile
    shortNames:
      - tp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                target:
                  type: object
                  properties:
                    scope:
                      type: string
                      enum: ["node", "cluster"]
                    nodeName:
                      type: string
                  required:
                    - scope
                sources:
                  type: object
                  properties:
                    cpu:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http", "prometheus"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                        prometheus:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            query:
                              type: string
                    gpu:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http", "prometheus"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                        prometheus:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            query:
                              type: string
                    thermal:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http", "prometheus"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                        prometheus:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            query:
                              type: string
                    context:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http", "prometheus"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                        prometheus:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            query:
                              type: string
                controls:
                  type: object
                  properties:
                    cpu:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                            mode:
                              type: string
                              enum: ["auto", "rapl", "dvfs"]
                    gpu:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: ["none", "host", "http"]
                        http:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            timeoutSeconds:
                              type: integer
                              minimum: 1
                              maximum: 300
                            mode:
                              type: string
                              enum: ["auto", "powercap", "clocks"]
            status:
              type: object
              properties:
                control:
                  type: object
                  properties:
                    cpu:
                      type: object
                      properties:
                        backend:
                          type: string
                        result:
                          type: string
                          enum: ["applied", "blocked", "error", "none"]
                        message:
                          type: string
                        observed:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        updatedAt:
                          type: string
                    gpu:
                      type: object
                      properties:
                        backend:
                          type: string
                        result:
                          type: string
                          enum: ["applied", "blocked", "error", "none"]
                        message:
                          type: string
                        observed:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        updatedAt:
                          type: string
                snapshot:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
          required:
            - spec
            - metadata
            - apiVersion
            - kind
      additionalPrinterColumns:
        - name: Scope
          type: string
          jsonPath: .spec.target.scope
        - name: Node
          type: string
          jsonPath: .spec.target.nodeName
        - name: CPU Source
          type: string
          jsonPath: .spec.sources.cpu.type
        - name: CPU Control
          type: string
          jsonPath: .spec.controls.cpu.type
      subresources:
        status: {}
