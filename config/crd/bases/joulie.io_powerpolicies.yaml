apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: powerpolicies.joulie.io
spec:
  group: joulie.io
  names:
    kind: PowerPolicy
    listKind: PowerPolicyList
    plural: powerpolicies
    singular: powerpolicy
    shortNames:
      - ppol
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                priority:
                  type: integer
                  format: int64
                  default: 0
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                cpu:
                  type: object
                  properties:
                    packagePowerCapWatts:
                      type: number
                      minimum: 1
                gpu:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    powerLimitWatts:
                      type: number
                      minimum: 1
              required:
                - selector
      additionalPrinterColumns:
        - name: Priority
          type: integer
          jsonPath: .spec.priority
        - name: CPU-Watts
          type: number
          jsonPath: .spec.cpu.packagePowerCapWatts
