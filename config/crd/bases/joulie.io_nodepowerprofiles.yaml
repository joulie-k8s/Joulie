apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodepowerprofiles.joulie.io
spec:
  group: joulie.io
  names:
    kind: NodePowerProfile
    listKind: NodePowerProfileList
    plural: nodepowerprofiles
    singular: nodepowerprofile
    shortNames:
      - npp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                nodeName:
                  type: string
                profile:
                  type: string
                  enum: ["performance", "eco"]
                cpu:
                  type: object
                  properties:
                    packagePowerCapWatts:
                      type: number
                      minimum: 1
                policy:
                  type: object
                  properties:
                    name:
                      type: string
              required:
                - nodeName
                - profile
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: CPU-Watts
          type: number
          jsonPath: .spec.cpu.packagePowerCapWatts
