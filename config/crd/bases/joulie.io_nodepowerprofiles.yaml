apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodepowerprofiles.joulie.io
spec:
  group: joulie.io
  names:
    kind: NodePowerProfile
    listKind: NodePowerProfileList
    plural: nodepowerprofiles
    singular: nodepowerprofile
    shortNames:
      - npp
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                nodeName:
                  type: string
                profile:
                  type: string
                  enum: ["performance", "eco"]
                cpu:
                  type: object
                  properties:
                    packagePowerCapWatts:
                      type: number
                      minimum: 1
                    packagePowerCapPctOfMax:
                      type: number
                      minimum: 0
                      exclusiveMinimum: true
                      maximum: 100
                gpu:
                  type: object
                  properties:
                    powerCap:
                      type: object
                      properties:
                        scope:
                          type: string
                          enum: ["perGpu"]
                        capWattsPerGpu:
                          type: number
                          minimum: 1
                        capPctOfMax:
                          type: number
                          minimum: 0
                          exclusiveMinimum: true
                          maximum: 100
                policy:
                  type: object
                  properties:
                    name:
                      type: string
                scheduling:
                  type: object
                  properties:
                    draining: { type: boolean }
                    reschedulablePressure:
                      type: string
                      enum: ["low", "medium", "high"]
              required:
                - nodeName
                - profile
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: CPU-Watts
          type: number
          jsonPath: .spec.cpu.packagePowerCapWatts
        - name: GPU-Watts
          type: number
          jsonPath: .spec.gpu.powerCap.capWattsPerGpu
        - name: GPU-Pct
          type: number
          jsonPath: .spec.gpu.powerCap.capPctOfMax
        - name: Draining
          type: boolean
          jsonPath: .spec.scheduling.draining
