apiVersion: v1
kind: Namespace
metadata:
  name: joulie-sim-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: joulie-simulator-node-classes
  namespace: joulie-sim-demo
data:
  node-classes.yaml: |
    classes:
      - name: intel-default
        matchLabels:
          feature.node.kubernetes.io/cpu-model.vendor_id: Intel
        model:
          baseIdleW: 70
          podW: 110
          dvfsDropWPerPct: 1.6
          raplHeadW: 5
          defaultCapW: 5000
      - name: amd-default
        matchLabels:
          feature.node.kubernetes.io/cpu-model.vendor_id: AMD
        model:
          baseIdleW: 80
          podW: 120
          dvfsDropWPerPct: 1.8
          raplHeadW: 5
          defaultCapW: 5000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: joulie-simulator
  namespace: joulie-sim-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: joulie-simulator
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: joulie-simulator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: joulie-simulator
subjects:
  - kind: ServiceAccount
    name: joulie-simulator
    namespace: joulie-sim-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joulie-telemetry-sim
  namespace: joulie-sim-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: joulie-telemetry-sim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: joulie-telemetry-sim
    spec:
      serviceAccountName: joulie-simulator
      containers:
        - name: simulator
          image: registry.cern.ch/mbunino/joulie/joulie-simulator:latest
          imagePullPolicy: Always
          env:
            - name: SIM_ADDR
              value: ":18080"
            - name: SIM_K8S_POD_WATCH
              value: "true"
            - name: SIM_POLL_INTERVAL
              value: "15s"
            - name: SIM_EVENT_BUFFER
              value: "500"
            - name: SIM_NODE_SELECTOR
              value: "joulie.io/managed=true"
            - name: SIM_NODE_CLASS_CONFIG
              value: "/etc/joulie-sim/node-classes.yaml"
            - name: SIM_BASE_IDLE_W
              value: "80"
            - name: SIM_POD_W
              value: "120"
            - name: SIM_DVFS_DROP_W_PER_PCT
              value: "1.8"
            - name: SIM_RAPL_HEADROOM_W
              value: "5"
            - name: SIM_DEFAULT_CAP_W
              value: "5000"
          ports:
            - name: http
              containerPort: 18080
          volumeMounts:
            - name: node-classes
              mountPath: /etc/joulie-sim
              readOnly: true
      volumes:
        - name: node-classes
          configMap:
            name: joulie-simulator-node-classes
---
apiVersion: v1
kind: Service
metadata:
  name: joulie-telemetry-sim
  namespace: joulie-sim-demo
spec:
  selector:
    app.kubernetes.io/name: joulie-telemetry-sim
  ports:
    - name: http
      port: 80
      targetPort: 18080
