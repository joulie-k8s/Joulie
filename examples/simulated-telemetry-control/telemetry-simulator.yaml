apiVersion: v1
kind: ConfigMap
metadata:
  name: joulie-telemetry-sim-script
  namespace: joulie-sim-demo
data:
  app.py: |
    import json
    import time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse

    STATE = {}

    def get_node_state(node):
      if node not in STATE:
        STATE[node] = {
          "capWatts": 5000.0,
          "throttlePct": 0,
          "lastAction": "none",
          "lastUpdate": int(time.time()),
        }
      return STATE[node]

    def simulated_power(node):
      st = get_node_state(node)
      base = 340.0
      dvfs_drop = float(st["throttlePct"]) * 1.8
      rapl_cap = float(st["capWatts"])
      p = max(60.0, base - dvfs_drop)
      p = min(p, rapl_cap + 5.0)
      return round(p, 2)

    class Handler(BaseHTTPRequestHandler):
      def _json(self, code, payload):
        body = json.dumps(payload).encode("utf-8")
        self.send_response(code)
        self.send_header("Content-Type", "application/json")
        self.send_header("Content-Length", str(len(body)))
        self.end_headers()
        self.wfile.write(body)

      def do_GET(self):
        parts = [p for p in urlparse(self.path).path.split("/") if p]
        if len(parts) == 2 and parts[0] == "telemetry":
          node = parts[1]
          st = get_node_state(node)
          p = simulated_power(node)
          print(f"[sim] telemetry node={node} powerW={p} capW={st['capWatts']} throttlePct={st['throttlePct']}", flush=True)
          self._json(200, {
            "node": node,
            "cpu": {
              "packagePowerWatts": p,
              "throttlePct": st["throttlePct"],
              "capWatts": st["capWatts"],
            },
            "ts": int(time.time())
          })
          return
        if len(parts) == 2 and parts[0] == "control":
          node = parts[1]
          st = get_node_state(node)
          self._json(200, {
            "node": node,
            "state": st,
            "ts": int(time.time())
          })
          return
        self._json(404, {"error": "not found"})

      def do_POST(self):
        parts = [p for p in urlparse(self.path).path.split("/") if p]
        if len(parts) != 2 or parts[0] != "control":
          self._json(404, {"error": "not found"})
          return

        node = parts[1]
        st = get_node_state(node)

        length = int(self.headers.get("Content-Length", "0"))
        raw = self.rfile.read(length) if length > 0 else b"{}"
        try:
          payload = json.loads(raw.decode("utf-8"))
        except Exception:
          self._json(400, {"error": "invalid json"})
          return

        action = str(payload.get("action", ""))
        cap = payload.get("capWatts")
        pct = payload.get("throttlePct")

        if action == "rapl.set_power_cap_watts" and isinstance(cap, (int, float)):
          st["capWatts"] = float(cap)
        elif action == "dvfs.set_throttle_pct" and isinstance(pct, (int, float)):
          st["throttlePct"] = max(0, min(100, int(pct)))
        st["lastAction"] = action
        st["lastUpdate"] = int(time.time())
        p = simulated_power(node)
        print(
          f"[sim] control node={node} action={action} capW={st['capWatts']} throttlePct={st['throttlePct']} powerW={p}",
          flush=True,
        )

        self._json(200, {
          "ok": True,
          "node": node,
          "state": st,
          "simulatedPackagePowerWatts": p,
        })

      def log_message(self, fmt, *args):
        print("[sim] %s - %s" % (self.address_string(), fmt % args), flush=True)

    if __name__ == "__main__":
      addr = ("0.0.0.0", 18080)
      print(f"[sim] listening on {addr[0]}:{addr[1]}", flush=True)
      HTTPServer(addr, Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joulie-telemetry-sim
  namespace: joulie-sim-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joulie-telemetry-sim
  template:
    metadata:
      labels:
        app: joulie-telemetry-sim
    spec:
      containers:
        - name: sim
          image: registry.cern.ch/docker.io/python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/app.py"]
          ports:
            - name: http
              containerPort: 18080
          volumeMounts:
            - name: app
              mountPath: /app
      volumes:
        - name: app
          configMap:
            name: joulie-telemetry-sim-script
---
apiVersion: v1
kind: Service
metadata:
  name: joulie-telemetry-sim
  namespace: joulie-sim-demo
spec:
  selector:
    app: joulie-telemetry-sim
  ports:
    - name: http
      port: 80
      targetPort: 18080
