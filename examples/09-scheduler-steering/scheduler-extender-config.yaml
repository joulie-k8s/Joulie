# KubeSchedulerConfiguration that enables the Joulie extender.
# Apply this as a ConfigMap and mount it into kube-scheduler.
# For k3s: add --config=/etc/kubernetes/scheduler-config.yaml to the k3s server flags.
apiVersion: v1
kind: ConfigMap
metadata:
  name: joulie-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    extenders:
      - urlPrefix: "http://joulie-scheduler-extender.joulie-system.svc.cluster.local:9876"
        filterVerb: "filter"
        prioritizeVerb: "prioritize"
        weight: 5
        enableHTTPS: false
        nodeCacheCapable: false
        ignorable: true
