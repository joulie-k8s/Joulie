# Joulie scheduler extender deployment.
# The extender is an HTTP server implementing the k8s scheduler extender protocol.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: joulie-scheduler-extender
  namespace: kube-system
  labels:
    app: joulie-scheduler-extender
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joulie-scheduler-extender
  template:
    metadata:
      labels:
        app: joulie-scheduler-extender
    spec:
      serviceAccountName: joulie-scheduler-extender
      containers:
        - name: extender
          image: registry.cern.ch/mbunino/joulie/joulie-scheduler:latest
          ports:
            - containerPort: 9876
          env:
            - name: EXTENDER_ADDR
              value: ":9876"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: joulie-scheduler-extender
  namespace: kube-system
spec:
  selector:
    app: joulie-scheduler-extender
  ports:
    - port: 9876
      targetPort: 9876
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: joulie-scheduler-extender
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: joulie-scheduler-extender
rules:
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins", "nodehardwares"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: joulie-scheduler-extender
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: joulie-scheduler-extender
subjects:
  - kind: ServiceAccount
    name: joulie-scheduler-extender
    namespace: kube-system
