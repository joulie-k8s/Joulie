apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-intent
  namespace: joulie-intent-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: perf-intent
  template:
    metadata:
      labels:
        app: perf-intent
        demo.joulie.io/recycle: "true"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: joulie.io/power-profile
                    operator: In
                    values: ["performance"]
      containers:
        - name: app
          image: registry.cern.ch/registry.k8s.io/pause:3.10
