run:
  baselines: [A, B, C]
  seeds: 3
  jobs: 300
  mean_inter_arrival_sec: 0.20
  time_scale: 60
  timeout: 1800
  settle_seconds: 8
  cleanup_timeout: 180

workload:
  perf_ratio: 0.20
  eco_ratio: 0.00
  cpu_units_min: 800
  cpu_units_max: 4000
  baseline_a_strip_affinity: true

simulator:
  base_speed_per_core: 8.0

policy:
  caps:
    performance_watts: 500
    eco_watts: 260
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
  static:
    hp_frac: 0.75
  queue_aware:
    hp_base_frac: 0.70
    hp_min: 2
    hp_max: 5
    perf_per_hp_node: 15

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.0.13
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.0.13

install:
  # Optional explicit path to simulator manifest.
  # Leave empty to use scripts/03_install_components.sh defaults.
  simulator_manifest: ""
