run:
  baselines: [A, B, C]
  seeds: 1
  jobs: 20
  mean_inter_arrival_sec: 0.05
  timeout: 240
  settle_seconds: 4
  cleanup_timeout: 45

workload:
  perf_ratio: 0.30
  eco_ratio: 0.50

policy:
  static:
    hp_frac: 0.50
  queue_aware:
    hp_base_frac: 0.60
    hp_min: 1
    hp_max: 5
    perf_per_hp_node: 10

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: latest
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: latest

install:
  # Optional explicit path to simulator manifest.
  # Leave empty to use scripts/03_install_components.sh defaults.
  simulator_manifest: ""
