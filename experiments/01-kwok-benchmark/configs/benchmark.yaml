run:
  baselines: [A, B, C]
  seeds: 1
  jobs: 12
  mean_inter_arrival_sec: 0.03
  timeout: 120
  settle_seconds: 2
  cleanup_timeout: 45

workload:
  perf_ratio: 0.30
  eco_ratio: 0.50
  cpu_units_min: 80
  cpu_units_max: 400

simulator:
  base_speed_per_core: 20.0

policy:
  static:
    hp_frac: 0.50
  queue_aware:
    hp_base_frac: 0.60
    hp_min: 1
    hp_max: 5
    perf_per_hp_node: 10

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.0.13
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.0.13

install:
  # Optional explicit path to simulator manifest.
  # Leave empty to use scripts/03_install_components.sh defaults.
  simulator_manifest: ""
