nodes:
  # 33 H100 NVL nodes — same total GPU node count as experiment 02 but a single family.
  # Hypothesis: Joulie performs better on a homogeneous cluster because every node can accept
  # any GPU job, eliminating the vendor/product-specific placement constraints that restrict
  # policy flexibility in the heterogeneous case.
  - node_name_prefix: kwok-h100-nvl
    replicas: 33
    vendor: nvidia
    product: NVIDIA H100 NVL
    cpu: AMD EPYC 9654 96-Core Processor
    cpu_sockets: 2
    cpu_cores: 192
    memory_gib: 1536
    gpu_count: 8
    gpu_min_cap_watts: 200
    gpu_max_cap_watts: 400

  # CPU-only nodes — identical to experiment 02 for a fair CPU workload comparison.
  - node_name_prefix: kwok-cpu-highcore
    replicas: 2
    vendor: none
    product: ""
    cpu: AMD EPYC 9965 192-Core Processor
    cpu_sockets: 2
    cpu_cores: 384
    memory_gib: 1536
    gpu_count: 0

  - node_name_prefix: kwok-cpu-highfreq
    replicas: 2
    vendor: none
    product: ""
    cpu: AMD EPYC 9375F 32-Core Processor
    cpu_sockets: 2
    cpu_cores: 64
    memory_gib: 770
    gpu_count: 0

  - node_name_prefix: kwok-cpu-intensive
    replicas: 4
    vendor: none
    product: ""
    cpu: AMD EPYC 9655 96-Core Processor
    cpu_sockets: 2
    cpu_cores: 192
    memory_gib: 1536
    gpu_count: 0
