run:
  baselines: [A, B, C]
  seeds: 3
  # 5000 nodes (4000 H100 NVL + 1000 CPU), ~2.4 jobs/node = 12000 jobs.
  # Inter-arrival 0.005s -> all injected in ~60s wall (3600 sim seconds).
  jobs: 12000
  mean_inter_arrival_sec: 0.005
  time_scale: 60
  timeout: 7200
  settle_seconds: 15
  cleanup_timeout: 600

workload:
  perf_ratio: 0.25
  compute_bound_perf_boost: 3.5
  gpu_ratio: 0.35
  gpu_request_per_job: 1
  burst_day_probability: 0.25
  burst_mean_jobs: 15.0
  burst_multiplier: 2.5
  emit_workload_records: true
  work_scale: 0.10
  baseline_a_strip_affinity: true
  allowed_workload_types:
    - debug_eval
    - single_gpu_training
    - cpu_preprocess
    - cpu_analytics

simulator:
  base_speed_per_core: 8.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml
  classifier_misclassify_rate: 0.0
  facility_ambient_base_c: 22.0
  facility_ambient_amplitude_c: 8.0
  facility_ambient_period_sec: 600

policy:
  cpu_write_absolute_caps: false
  gpu_write_absolute_caps: true
  caps:
    cpu_performance_pct_of_max: 100
    cpu_eco_pct_of_max: 65
    gpu_performance_pct_of_max: 100
    gpu_eco_pct_of_max: 65
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
    queue_aware_operator_reconcile_sim_seconds: 300
  static:
    hp_frac: 0.40
  queue_aware:
    hp_base_frac: 0.40
    # Scaled for 5000 nodes: min=50, max=4000
    hp_min: 50
    hp_max: 4000
    perf_per_hp_node: 15

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.1.1
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.1.1

inventory:
  source: experiments/03-homogeneous-h100-benchmark/configs/cluster-nodes-5k.yaml

install:
  kind_cluster_config: experiments/03-homogeneous-h100-benchmark/configs/kind-cluster-5k.yaml
