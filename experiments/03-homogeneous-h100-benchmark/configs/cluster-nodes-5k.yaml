nodes:
  # 4000 H100 NVL nodes - same architecture as the 33-node config scaled up.
  # All GPU nodes identical: any GPU job can schedule on any GPU node.
  - node_name_prefix: kwok-h100-nvl
    replicas: 4000
    vendor: nvidia
    product: NVIDIA H100 NVL
    cpu: AMD EPYC 9654 96-Core Processor
    cpu_sockets: 2
    cpu_cores: 192
    memory_gib: 1536
    gpu_count: 8
    gpu_min_cap_watts: 200
    gpu_max_cap_watts: 400

  # CPU-only nodes - 1000 total, identical to experiment 02 for fair comparison.
  - node_name_prefix: kwok-cpu-highcore
    replicas: 250
    vendor: none
    product: ""
    cpu: AMD EPYC 9965 192-Core Processor
    cpu_sockets: 2
    cpu_cores: 384
    memory_gib: 1536
    gpu_count: 0

  - node_name_prefix: kwok-cpu-highfreq
    replicas: 250
    vendor: none
    product: ""
    cpu: AMD EPYC 9375F 32-Core Processor
    cpu_sockets: 2
    cpu_cores: 64
    memory_gib: 770
    gpu_count: 0

  - node_name_prefix: kwok-cpu-intensive
    replicas: 500
    vendor: none
    product: ""
    cpu: AMD EPYC 9655 96-Core Processor
    cpu_sockets: 2
    cpu_cores: 192
    memory_gib: 1536
    gpu_count: 0
