run:
  baselines: [A, B, C]
  seeds: 1
  # 40-NODE DEBUG: validate workload patterns on small cluster.
  # 41 nodes (33 H100 NVL + 8 CPU).  time_scale 120.
  # 6000 jobs over 600 wall-sec → 20 sim-hours of arrivals (full day/night).
  # timeout 660 wall-sec → 22 sim-hours (arrival + drain).
  jobs: 6000
  mean_inter_arrival_sec: 0.1
  time_scale: 120
  timeout: 660
  settle_seconds: 10
  cleanup_timeout: 120

workload:
  perf_ratio: 0.25
  compute_bound_perf_boost: 3.5
  gpu_ratio: 0.75
  gpu_request_per_job: 1
  burst_day_probability: 0.50
  burst_mean_jobs: 25.0
  burst_multiplier: 3.5
  dip_day_probability: 0.40
  dip_multiplier: 0.08
  emit_workload_records: true
  work_scale: 80.0
  diurnal_peak_rate: 5
  baseline_a_strip_affinity: true
  allowed_workload_types:
    - debug_eval
    - single_gpu_training
    - cpu_preprocess
    - cpu_analytics

simulator:
  base_speed_per_core: 2.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml
  facility_ambient_base_c: 22.0
  facility_ambient_amplitude_c: 8.0
  facility_ambient_period_sec: 720

policy:
  cpu_write_absolute_caps: true
  gpu_write_absolute_caps: true
  caps:
    cpu_performance_pct_of_max: 100
    cpu_eco_pct_of_max: 60
    gpu_performance_pct_of_max: 100
    gpu_eco_pct_of_max: 70
    performance_watts: 600
    eco_watts: 220
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
    queue_aware_operator_reconcile_sim_seconds: 300
  static:
    hp_frac: 0.25
  queue_aware:
    hp_base_frac: 0.25
    hp_min: 1
    hp_max: 25
    perf_per_hp_node: 10

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.1.1
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.1.1

inventory:
  source: experiments/03-homogeneous-h100-benchmark/configs/cluster-nodes.yaml

install:
  kind_cluster_config: experiments/03-homogeneous-h100-benchmark/configs/kind-cluster.yaml
