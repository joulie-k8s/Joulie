run:
  baselines: [A, B, C]
  seeds: 3
  # 5000 nodes, ~2 jobs/node = 10000 jobs.
  # Inter-arrival 0.005s -> all injected in ~50s wall (3000 sim seconds).
  jobs: 10000
  mean_inter_arrival_sec: 0.005
  time_scale: 60
  timeout: 7200
  settle_seconds: 15
  cleanup_timeout: 600

workload:
  perf_ratio: 0.20
  compute_bound_perf_boost: 3.5
  gpu_ratio: 0.00
  burst_day_probability: 0.20
  burst_mean_jobs: 15.0
  burst_multiplier: 2.5
  emit_workload_records: true
  # Slightly reduced work per job to keep total runtime bounded at 5k scale.
  work_scale: 0.10
  baseline_a_strip_affinity: true
  allowed_workload_types:
    - cpu_preprocess
    - cpu_analytics

simulator:
  base_speed_per_core: 18.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml

policy:
  cpu_write_absolute_caps: false
  caps:
    cpu_performance_pct_of_max: 100
    cpu_eco_pct_of_max: 65
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
    queue_aware_operator_reconcile_sim_seconds: 300
  static:
    hp_frac: 0.30
  queue_aware:
    hp_base_frac: 0.30
    # Scaled for 5000 nodes: min=50, max=3750
    hp_min: 50
    hp_max: 3750
    perf_per_hp_node: 20

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.1.1
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.1.1

inventory:
  source: experiments/01-cpu-only-benchmark/configs/cluster-nodes-5k.yaml

install:
  kind_cluster_config: experiments/01-cpu-only-benchmark/configs/kind-cluster-5k.yaml
