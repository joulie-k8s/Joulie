# Heterogeneous cluster for experiment 04 - control loop benchmark
# 8 nodes: 4 GPU (H100-class) + 4 CPU-only
# Matches the simulation in run.go and experiments/02-heterogeneous-benchmark

nodes:
  # GPU nodes
  - name: gpu-node-1
    role: gpu
    cpuCores: 192
    cpuSockets: 2
    cpuModel: "AMD EPYC 9654"
    cpuMaxPowerW: 720
    gpuCount: 8
    gpuModel: "NVIDIA H100 SXM5"
    gpuMaxPowerPerUnit: 400
    memory: 768Gi
    networkClass: "400G"

  - name: gpu-node-2
    role: gpu
    cpuCores: 192
    cpuSockets: 2
    cpuModel: "AMD EPYC 9654"
    cpuMaxPowerW: 720
    gpuCount: 8
    gpuModel: "NVIDIA H100 SXM5"
    gpuMaxPowerPerUnit: 400
    memory: 768Gi
    networkClass: "400G"

  - name: gpu-node-3
    role: gpu
    cpuCores: 192
    cpuSockets: 2
    cpuModel: "AMD EPYC 9654"
    cpuMaxPowerW: 720
    gpuCount: 4
    gpuModel: "NVIDIA H100 PCIe"
    gpuMaxPowerPerUnit: 350
    memory: 512Gi
    networkClass: "100G"

  - name: gpu-node-4
    role: gpu
    cpuCores: 128
    cpuSockets: 2
    cpuModel: "Intel Xeon 8480+"
    cpuMaxPowerW: 480
    gpuCount: 4
    gpuModel: "NVIDIA A100 SXM4"
    gpuMaxPowerPerUnit: 400
    memory: 512Gi
    networkClass: "100G"

  # CPU-only nodes
  - name: cpu-node-1
    role: cpu
    cpuCores: 192
    cpuSockets: 2
    cpuModel: "AMD EPYC 9654"
    cpuMaxPowerW: 720
    gpuCount: 0
    memory: 768Gi
    networkClass: "100G"

  - name: cpu-node-2
    role: cpu
    cpuCores: 192
    cpuSockets: 2
    cpuModel: "AMD EPYC 9654"
    cpuMaxPowerW: 720
    gpuCount: 0
    memory: 512Gi
    networkClass: "100G"

  - name: cpu-node-3
    role: cpu
    cpuCores: 128
    cpuSockets: 2
    cpuModel: "Intel Xeon 8480+"
    cpuMaxPowerW: 480
    gpuCount: 0
    memory: 512Gi
    networkClass: "25G"

  - name: cpu-node-4
    role: cpu
    cpuCores: 64
    cpuSockets: 1
    cpuModel: "AMD EPYC 7443"
    cpuMaxPowerW: 250
    gpuCount: 0
    memory: 256Gi
    networkClass: "25G"
