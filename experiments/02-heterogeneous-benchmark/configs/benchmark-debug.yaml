run:
  baselines: [A, B, C]
  seeds: 1
  jobs: 32
  mean_inter_arrival_sec: 0.02
  time_scale: 60
  timeout: 240
  settle_seconds: 2
  cleanup_timeout: 120

workload:
  perf_ratio: 0.35
  eco_ratio: 0.00
  gpu_ratio: 0.75
  gpu_request_per_job: 1
  burst_day_probability: 0.30
  burst_mean_jobs: 8.0
  burst_multiplier: 2.2
  emit_workload_records: true
  work_scale: 1.0
  baseline_a_strip_affinity: true

simulator:
  base_speed_per_core: 100.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml

policy:
  cpu_write_absolute_caps: false
  gpu_write_absolute_caps: false
  caps:
    cpu_performance_pct_of_max: 100
    cpu_eco_pct_of_max: 80
    gpu_performance_pct_of_max: 100
    gpu_eco_pct_of_max: 80
  loop:
    operator_reconcile_interval: "10s"
    agent_reconcile_interval: "5s"
  static:
    hp_frac: 0.50
  queue_aware:
    hp_base_frac: 0.60
    hp_min: 1
    hp_max: 8
    perf_per_hp_node: 10

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.0.15
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.0.15

install:
  kind_cluster_config: experiments/02-heterogeneous-benchmark/configs/kind-cluster.yaml
