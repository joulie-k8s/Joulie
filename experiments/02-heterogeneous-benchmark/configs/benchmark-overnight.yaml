run:
  baselines: [A, B, C]
  seeds: 3
  jobs: 300
  mean_inter_arrival_sec: 0.12
  time_scale: 60
  timeout: 5400
  settle_seconds: 10
  cleanup_timeout: 300

workload:
  # Research-cluster / HEP-style overnight mix:
  # - most jobs are flexible exploratory runs, preprocessing, or analytics
  # - a meaningful minority remains performance-sensitive
  # - explicit eco-only jobs stay disabled because they are uncommon in practice
  #   and make the benchmark more about benchmark-side placement than policy value
  perf_ratio: 0.15
  eco_ratio: 0.00
  # Many jobs are GPU-backed, but CPU-side preprocessing/analytics is still common.
  gpu_ratio: 0.45
  gpu_request_per_job: 1
  burst_day_probability: 0.25
  burst_mean_jobs: 8.0
  burst_multiplier: 2.0
  emit_workload_records: true
  # Long enough to make throttling/capping matter, but still dominated by the
  # single-GPU and CPU-side exploratory workload mix described in the workload report.
  work_scale: 0.10
  baseline_a_strip_affinity: true
  allowed_workload_types:
    - debug_eval
    - single_gpu_training
    - cpu_preprocess
    - cpu_analytics

simulator:
  base_speed_per_core: 18.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml

policy:
  caps:
    performance_watts: 500
    eco_watts: 140
    gpu_performance_pct_of_max: 100
    gpu_eco_pct_of_max: 60
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
  static:
    hp_frac: 0.45
  queue_aware:
    hp_base_frac: 0.50
    hp_min: 2
    hp_max: 10
    perf_per_hp_node: 18

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.0.14
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.0.14

install:
  kind_cluster_config: experiments/02-heterogeneous-benchmark/configs/kind-cluster.yaml
