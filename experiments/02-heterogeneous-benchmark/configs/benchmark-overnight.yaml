run:
  baselines: [A, B, C]
  seeds: 3
  jobs: 2500
  mean_inter_arrival_sec: 0.12
  time_scale: 60
  timeout: 14400
  settle_seconds: 10
  cleanup_timeout: 600

workload:
  # Research-cluster / HEP-style overnight mix:
  # - most jobs are flexible exploratory runs, preprocessing, or analytics
  # - a meaningful minority remains performance-sensitive
  # - explicit eco-only jobs stay disabled because they are uncommon in practice
  #   and make the benchmark more about benchmark-side placement than policy value
  perf_ratio: 0.15
  compute_bound_perf_boost: 3.5
  # Many jobs are GPU-backed, but CPU-side preprocessing/analytics is still common.
  gpu_ratio: 0.45
  gpu_request_per_job: 1
  burst_day_probability: 0.25
  burst_mean_jobs: 8.0
  burst_multiplier: 2.0
  emit_workload_records: true
  # Slightly heavier than the showcase/default overnight profile so the much larger
  # 41-node heterogeneous cluster stays occupied for long enough to expose
  # scheduling/capping tradeoffs without relying on artificially bursty arrivals.
  work_scale: 0.12
  baseline_a_strip_affinity: true
  allowed_workload_types:
    - debug_eval
    - single_gpu_training
    - cpu_preprocess
    - cpu_analytics

simulator:
  base_speed_per_core: 18.0
  manifest: examples/07 - simulator-gpu-powercaps/manifests/20-simulator.yaml

policy:
  cpu_write_absolute_caps: false
  gpu_write_absolute_caps: false
  caps:
    cpu_performance_pct_of_max: 100
    cpu_eco_pct_of_max: 80
    gpu_performance_pct_of_max: 100
    gpu_eco_pct_of_max: 80
  loop:
    operator_reconcile_interval: "20s"
    agent_reconcile_interval: "10s"
    # Queue-aware (baseline C) uses a slower operator reconcile to avoid
    # thrashing node profiles. Value is in simulated seconds; the sweep script
    # divides by run.time_scale to get the wall-clock interval.
    queue_aware_operator_reconcile_sim_seconds: 300
  static:
    hp_frac: 0.45
  queue_aware:
    hp_base_frac: 0.50
    hp_min: 2
    hp_max: 10
    perf_per_hp_node: 18

images:
  joulie_registry: registry.cern.ch/mbunino/joulie
  joulie_tag: dev0.0.15
  sim_registry: registry.cern.ch/mbunino/joulie
  sim_image: joulie-simulator
  sim_tag: dev0.0.15

install:
  kind_cluster_config: experiments/02-heterogeneous-benchmark/configs/kind-cluster.yaml
