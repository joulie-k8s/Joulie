name: Docs

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.157.0
      SITE_ROOT: /Joulie/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: website/go.mod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS toolchain
        working-directory: website
        run: |
          npm install --no-save postcss postcss-cli autoprefixer

      - name: Build site
        working-directory: website
        run: |
          hugo mod get github.com/google/docsy@latest
          hugo mod get github.com/google/docsy/dependencies@latest
          hugo --gc --minify --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Deploy main docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: website/public
          destination_dir: .
          keep_files: true
          force_orphan: false

      - name: Ensure versions manifest exists and has main
        run: |
          set -euo pipefail
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          cd gh-pages
          FILE="versions.json"
          ROOT_PATH="${{ env.SITE_ROOT }}"
          if [ ! -f "$FILE" ]; then
            echo '{"default":"main","versions":[{"name":"main","path":"'"$ROOT_PATH"'"}]}' > "$FILE"
          else
            tmp="$(mktemp)"
            jq --arg root "$ROOT_PATH" '
              .default = "main"
              | .versions = (
                  ((.versions // []) | map(select(.name != "main")))
                  | [{"name":"main","path":$root}] + .
                )
            ' "$FILE" > "$tmp"
            mv "$tmp" "$FILE"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if ! git diff --cached --quiet; then
            git commit -m "docs: ensure versions manifest"
            git push
          fi
