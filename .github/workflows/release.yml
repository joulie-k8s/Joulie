name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to CERN registry
        uses: docker/login-action@v3
        with:
          registry: registry.cern.ch
          username: ${{ secrets.CERN_REGISTRY_USER }}
          password: ${{ secrets.CERN_REGISTRY_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: COMPONENT=agent
          push: true
          tags: |
            registry.cern.ch/mbunino/joulie/joulie-agent:${{ steps.vars.outputs.version }}
            registry.cern.ch/mbunino/joulie/joulie-agent:latest

      - name: Build and push operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: COMPONENT=operator
          push: true
          tags: |
            registry.cern.ch/mbunino/joulie/joulie-operator:${{ steps.vars.outputs.version }}
            registry.cern.ch/mbunino/joulie/joulie-operator:latest

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to CERN registry for Helm OCI
        run: echo "${{ secrets.CERN_REGISTRY_PASSWORD }}" | helm registry login registry.cern.ch -u "${{ secrets.CERN_REGISTRY_USER }}" --password-stdin

      - name: Package chart
        run: |
          helm package charts/joulie \
            --version "${{ steps.vars.outputs.version }}" \
            --app-version "${{ steps.vars.outputs.version }}"

      - name: Push chart to CERN registry (OCI)
        run: |
          helm push "joulie-${{ steps.vars.outputs.version }}.tgz" "oci://registry.cern.ch/mbunino/joulie"

  publish-docs-version:
    runs-on: ubuntu-latest
    needs: publish-helm-chart
    env:
      HUGO_VERSION: 0.157.0
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: website/go.mod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PostCSS toolchain
        working-directory: website
        run: |
          npm install --no-save postcss postcss-cli autoprefixer

      - name: Build versioned docs
        working-directory: website
        run: |
          hugo mod get github.com/google/docsy@latest
          hugo mod get github.com/google/docsy/dependencies@latest
          hugo --gc --minify --baseURL "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/versions/v${{ steps.vars.outputs.version }}/"

      - name: Deploy versioned docs to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: website/public
          destination_dir: versions/v${{ steps.vars.outputs.version }}
          keep_files: true
          force_orphan: false

      - name: Update versions manifest
        run: |
          set -euo pipefail
          ROOT_PATH="/${{ github.event.repository.name }}/"
          VERSION_NAME="v${{ steps.vars.outputs.version }}"
          VERSION_PATH="/${{ github.event.repository.name }}/versions/${VERSION_NAME}/"
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          cd gh-pages
          FILE="versions.json"
          if [ ! -f "$FILE" ]; then
            echo '{"default":"main","versions":[{"name":"main","path":"'"$ROOT_PATH"'"},{"name":"'"$VERSION_NAME"'","path":"'"$VERSION_PATH"'"}]}' > "$FILE"
          else
            tmp="$(mktemp)"
            jq --arg root "$ROOT_PATH" --arg ver "$VERSION_NAME" --arg path "$VERSION_PATH" '
              .default = "main"
              | .versions = (
                  (.versions // [])
                  | map(select(.name != "main" and .name != $ver))
                  | [{"name":"main","path":$root},{"name":$ver,"path":$path}] + .
                )
            ' "$FILE" > "$tmp"
            mv "$tmp" "$FILE"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          if ! git diff --cached --quiet; then
            git commit -m "docs: add version ${VERSION_NAME}"
            git push
          fi
