name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to CERN registry
        uses: docker/login-action@v3
        with:
          registry: registry.cern.ch
          username: ${{ secrets.CERN_REGISTRY_USER }}
          password: ${{ secrets.CERN_REGISTRY_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: COMPONENT=agent
          push: true
          tags: |
            registry.cern.ch/mbunino/joulie/joulie-agent:${{ steps.vars.outputs.version }}
            registry.cern.ch/mbunino/joulie/joulie-agent:latest

      - name: Build and push operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: COMPONENT=operator
          push: true
          tags: |
            registry.cern.ch/mbunino/joulie/joulie-operator:${{ steps.vars.outputs.version }}
            registry.cern.ch/mbunino/joulie/joulie-operator:latest

      - name: Build and push scheduler extender
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: COMPONENT=scheduler
          push: true
          tags: |
            registry.cern.ch/mbunino/joulie/joulie-scheduler:${{ steps.vars.outputs.version }}
            registry.cern.ch/mbunino/joulie/joulie-scheduler:latest

  publish-kubectl-plugin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build kubectl-joulie
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="kubectl-joulie-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags="-s -w -X main.version=${{ steps.vars.outputs.version }}" \
            -o "${BINARY}" ./cmd/kubectl-joulie
          chmod +x "${BINARY}"

      - name: Login to CERN registry
        uses: docker/login-action@v3
        with:
          registry: registry.cern.ch
          username: ${{ secrets.CERN_REGISTRY_USER }}
          password: ${{ secrets.CERN_REGISTRY_PASSWORD }}

      - name: Push binary as OCI artifact to Harbor
        run: |
          BINARY="kubectl-joulie-${{ matrix.goos }}-${{ matrix.goarch }}"
          TAG="${{ steps.vars.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz"
          tar xzf oras_1.2.2_linux_amd64.tar.gz oras
          ./oras push "registry.cern.ch/mbunino/joulie/kubectl-joulie:${TAG}" \
            "${BINARY}:application/octet-stream"

      - name: Attach binary to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BINARY="kubectl-joulie-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${{ github.event.release.tag_name }}" "${BINARY}" --clobber

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Set release version
        id: vars
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Login to CERN registry for Helm OCI
        run: echo "${{ secrets.CERN_REGISTRY_PASSWORD }}" | helm registry login registry.cern.ch -u "${{ secrets.CERN_REGISTRY_USER }}" --password-stdin

      - name: Package chart
        run: |
          helm package charts/joulie \
            --version "${{ steps.vars.outputs.version }}" \
            --app-version "${{ steps.vars.outputs.version }}"

      - name: Push chart to CERN registry (OCI)
        run: |
          helm push "joulie-${{ steps.vars.outputs.version }}.tgz" "oci://registry.cern.ch/mbunino/joulie"
