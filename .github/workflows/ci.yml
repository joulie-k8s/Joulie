name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint charts
        run: |
          helm lint charts/joulie
          helm lint charts/joulie-simulator

      - name: Render charts
        run: |
          helm template joulie charts/joulie -f values/joulie.yaml >/dev/null
          helm template joulie-simulator charts/joulie-simulator >/dev/null

