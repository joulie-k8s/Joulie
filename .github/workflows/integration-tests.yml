name: integration-tests

on:
  pull_request:
    paths:
      - "ci/**"
      - "cmd/**"
      - "charts/**"
      - "config/**"
      - "simulator/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/integration-tests.yml"
  push:
    branches: ["main"]
    paths:
      - "ci/**"
      - "cmd/**"
      - "charts/**"
      - "config/**"
      - "simulator/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/integration-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration tests with Dagger
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.1"
          verb: call
          module: ./ci
          args: integration --source=.
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
