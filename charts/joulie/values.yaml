nameOverride: ""
fullnameOverride: ""

agent:
  mode: daemonset
  image:
    repository: registry.cern.ch/mbunino/joulie/joulie-agent
    tag: latest
    pullPolicy: Always
  hostNetwork: true
  privileged: true
  env:
    RECONCILE_INTERVAL: "20s"
    METRICS_ADDR: ":8080"
    SIMULATE_ONLY: "false"
    HARDWARE_CATALOG_PATH: "simulator/catalog/hardware.yaml"
  daemonset:
    nodeSelector:
      joulie.io/managed: "true"
  pool:
    replicas: 2
    nodeSelector: "joulie.io/managed=true"
    shards: 2
  service:
    enabled: true
    port: 8080
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      prometheus.io/path: /metrics

operator:
  image:
    repository: registry.cern.ch/mbunino/joulie/joulie-operator
    tag: latest
    pullPolicy: Always
  env:
    RECONCILE_INTERVAL: "1m"
    METRICS_ADDR: ":8081"
    NODE_SELECTOR: "joulie.io/managed=true"
    RESERVED_LABEL_KEY: "joulie.io/reserved"
    POWER_PROFILE_LABEL: "joulie.io/power-profile"
    PERFORMANCE_CAP_WATTS: "5000"
    ECO_CAP_WATTS: "120"
    CPU_PERFORMANCE_CAP_PCT_OF_MAX: "100"
    CPU_ECO_CAP_PCT_OF_MAX: "60"
    CPU_WRITE_ABSOLUTE_CAPS: "false"
    GPU_PERFORMANCE_CAP_PCT_OF_MAX: "100"
    GPU_ECO_CAP_PCT_OF_MAX: "60"
    GPU_WRITE_ABSOLUTE_CAPS: "false"
    HARDWARE_CATALOG_PATH: "simulator/catalog/hardware.yaml"
    GPU_MODEL_CAPS_JSON: "{}"
    GPU_PRODUCT_LABEL_KEYS: "joulie.io/gpu.product,nvidia.com/gpu.product,amd.com/gpu.product,amd.com/gpu.family"
    ENABLE_CLASSIFIER: "true"
    CLASSIFY_INTERVAL: "30s"
    PROMETHEUS_ADDRESS: "http://prometheus-operated.monitoring:9090"
    KEPLER_AVAILABLE: "true"
    ENABLE_ACTIVE_RESCHEDULING: "false"
    RESCHEDULE_INTERVAL: "60s"
    RESCHEDULE_MAX_EVICTIONS_PER_NODE: "1"
    ENABLE_FACILITY_METRICS: "false"
    FACILITY_PROMETHEUS_ADDRESS: "http://prometheus-operated.monitoring:9090"
    FACILITY_POLL_INTERVAL: "30s"
  service:
    enabled: true
    port: 8081
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8081"
      prometheus.io/path: /metrics

schedulerExtender:
  enabled: false  # disabled by default; enable when using custom kube-scheduler config
  image:
    repository: registry.cern.ch/mbunino/joulie/joulie-scheduler
    tag: latest
  port: 9876
  replicas: 1
  hostNetwork: false
  nodeSelector: {}
  env: {}

grafanaDashboard:
  enabled: false  # enable if Grafana sidecar is configured to auto-provision dashboards
  labels:
    grafana_dashboard: "1"
