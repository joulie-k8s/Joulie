apiVersion: apps/v1
kind: Deployment
metadata:
  name: joulie-operator
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: joulie-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: joulie-operator
    spec:
      serviceAccountName: joulie-operator
      {{- with .Values.operator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.operator.service.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.operator.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.hardwareCatalog.enabled }}
            - name: HARDWARE_CATALOG_PATH
              value: "{{ .Values.hardwareCatalog.mountPath }}/{{ .Values.hardwareCatalog.key }}"
            {{- end }}
          {{- if .Values.hardwareCatalog.enabled }}
          volumeMounts:
            - name: hardware-catalog
              mountPath: {{ .Values.hardwareCatalog.mountPath }}
              readOnly: true
          {{- end }}
      {{- if .Values.hardwareCatalog.enabled }}
      volumes:
        - name: hardware-catalog
          configMap:
            name: {{ .Values.hardwareCatalog.configMapName }}
      {{- end }}

