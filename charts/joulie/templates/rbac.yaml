apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "joulie.fullname" . }}-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodehardwares"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodehardwares/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "joulie.fullname" . }}-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "joulie.fullname" . }}-agent
subjects:
  - kind: ServiceAccount
    name: joulie-agent
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "joulie.fullname" . }}-operator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["joulie.io"]
    resources: ["nodehardwares"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["joulie.io"]
    resources: ["workloadprofiles"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "joulie.fullname" . }}-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "joulie.fullname" . }}-operator
subjects:
  - kind: ServiceAccount
    name: joulie-operator
    namespace: {{ .Release.Namespace }}
{{- if .Values.schedulerExtender.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "joulie.fullname" . }}-scheduler-extender
rules:
  - apiGroups: ["joulie.io"]
    resources: ["nodetwins", "workloadprofiles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "joulie.fullname" . }}-scheduler-extender
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "joulie.fullname" . }}-scheduler-extender
subjects:
  - kind: ServiceAccount
    name: {{ include "joulie.fullname" . }}-scheduler-extender
    namespace: {{ .Release.Namespace }}
{{- end }}
