apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodetwinstates.joulie.io
spec:
  group: joulie.io
  names:
    kind: NodeTwinState
    listKind: NodeTwinStateList
    plural: nodetwinstates
    singular: nodetwinstate
    shortNames:
      - nts
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                nodeName:
                  type: string
              required:
                - nodeName
            status:
              type: object
              properties:
                nodeName: { type: string }
                schedulableClass:
                  type: string
                  enum: ["eco", "performance", "draining", "unknown"]
                predictedPowerHeadroomScore:
                  type: number
                  description: "0=no headroom, 100=full headroom"
                predictedCoolingStressScore:
                  type: number
                  description: "0=no stress, 100=max stress"
                predictedPsuStressScore:
                  type: number
                  description: "0=no stress, 100=max stress"
                effectiveCapState:
                  type: object
                  properties:
                    cpuPct: { type: number }
                    gpuPct: { type: number }
                hardwareDensityScore:
                  type: number
                  description: "Relative compute density score"
                rescheduleRecommendations:
                  type: array
                  items:
                    type: object
                    properties:
                      workloadRef:
                        type: object
                        properties:
                          kind: { type: string }
                          namespace: { type: string }
                          name: { type: string }
                      reason: { type: string }
                lastUpdated: { type: string }
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Class
          type: string
          jsonPath: .status.schedulableClass
        - name: PowerHeadroom
          type: number
          jsonPath: .status.predictedPowerHeadroomScore
        - name: CoolingStress
          type: number
          jsonPath: .status.predictedCoolingStressScore
        - name: PSUStress
          type: number
          jsonPath: .status.predictedPsuStressScore
      subresources:
        status: {}
