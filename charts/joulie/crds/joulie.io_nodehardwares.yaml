apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodehardwares.joulie.io
spec:
  group: joulie.io
  names:
    kind: NodeHardware
    listKind: NodeHardwareList
    plural: nodehardwares
    singular: nodehardware
    shortNames:
      - nhw
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                nodeName:
                  type: string
              required:
                - nodeName
            status:
              type: object
              properties:
                cpu:
                  type: object
                  properties:
                    rawModel:
                      type: string
                    model:
                      type: string
                    vendor:
                      type: string
                    sockets:
                      type: integer
                    totalCores:
                      type: integer
                    coresPerSocket:
                      type: integer
                    driverFamily:
                      type: string
                    capMinWatts:
                      type: number
                    capMaxWatts:
                      type: number
                    controlAvailable:
                      type: boolean
                    telemetryAvailable:
                      type: boolean
                    quality:
                      type: string
                    warnings:
                      type: array
                      items:
                        type: string
                gpu:
                  type: object
                  properties:
                    rawModel:
                      type: string
                    model:
                      type: string
                    vendor:
                      type: string
                    count:
                      type: integer
                    capMinWatts:
                      type: number
                    capMaxWatts:
                      type: number
                    currentCapWatts:
                      type: number
                    controlAvailable:
                      type: boolean
                    telemetryAvailable:
                      type: boolean
                    quality:
                      type: string
                    warnings:
                      type: array
                      items:
                        type: string
                capabilities:
                  type: object
                  properties:
                    cpuControl:
                      type: boolean
                    gpuControl:
                      type: boolean
                    cpuTelemetry:
                      type: boolean
                    gpuTelemetry:
                      type: boolean
                quality:
                  type: object
                  properties:
                    overall:
                      type: string
                    warnings:
                      type: array
                      items:
                        type: string
                updatedAt:
                  type: string
          required:
            - spec
            - metadata
            - apiVersion
            - kind
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: CPU
          type: string
          jsonPath: .status.cpu.model
        - name: GPU
          type: string
          jsonPath: .status.gpu.model
        - name: GPUCount
          type: integer
          jsonPath: .status.gpu.count
        - name: Quality
          type: string
          jsonPath: .status.quality.overall
      subresources:
        status: {}
