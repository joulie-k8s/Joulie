apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nodetwins.joulie.io
spec:
  group: joulie.io
  names:
    kind: NodeTwin
    listKind: NodeTwinList
    plural: nodetwins
    singular: nodetwin
    shortNames:
      - nt
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: "Desired power state for this node, written by the operator."
              properties:
                nodeName:
                  type: string
                profile:
                  type: string
                  enum: ["performance", "eco"]
                cpu:
                  type: object
                  properties:
                    packagePowerCapWatts:
                      type: number
                      minimum: 1
                    packagePowerCapPctOfMax:
                      type: number
                      minimum: 0
                      exclusiveMinimum: true
                      maximum: 100
                gpu:
                  type: object
                  properties:
                    powerCap:
                      type: object
                      properties:
                        scope:
                          type: string
                          enum: ["perGpu"]
                        capWattsPerGpu:
                          type: number
                          minimum: 1
                        capPctOfMax:
                          type: number
                          minimum: 0
                          exclusiveMinimum: true
                          maximum: 100
                policy:
                  type: object
                  properties:
                    name:
                      type: string
                scheduling:
                  type: object
                  properties:
                    draining: { type: boolean }
              required:
                - nodeName
                - profile
            status:
              type: object
              description: "Computed twin state, written by the operator's digital twin model."
              properties:
                schedulableClass:
                  type: string
                  enum: ["eco", "performance", "draining", "unknown"]
                powerMeasurement:
                  type: object
                  description: "Measured power data, TDP/cap breakdowns, and power trend."
                  properties:
                    source:
                      type: string
                      description: "Measurement source: kepler, utilization, or static"
                      enum: ["kepler", "utilization", "static", "http", "http-error", "http-no-endpoint", "prometheus", "prometheus-no-data"]
                    measuredNodePowerW:
                      type: number
                      description: "Measured total node power draw in watts"
                    cpuCappedPowerW:
                      type: number
                      description: "CPU power budget based on TDP and cap percentage"
                    gpuCappedPowerW:
                      type: number
                      description: "GPU power budget based on TDP and cap percentage"
                    nodeCappedPowerW:
                      type: number
                      description: "Total node power budget (cpuCappedPowerW + gpuCappedPowerW)"
                    cpuTdpW:
                      type: number
                      description: "CPU thermal design power (uncapped hardware maximum)"
                    gpuTdpW:
                      type: number
                      description: "GPU thermal design power (uncapped hardware maximum)"
                    nodeTdpW:
                      type: number
                      description: "Total node TDP (cpuTdpW + gpuTdpW)"
                    powerTrendWPerMin:
                      type: number
                      description: "Rate of change of measured power in watts per minute"
                predictedPowerHeadroomScore:
                  type: number
                  description: "0=no headroom, 100=full headroom"
                predictedCoolingStressScore:
                  type: number
                  description: "0=no stress, 100=max stress"
                predictedPsuStressScore:
                  type: number
                  description: "Reserved for future rack-topology-aware extensions. Not used in scoring. 0=no stress, 100=max stress"
                effectiveCapState:
                  type: object
                  properties:
                    cpuPct: { type: number }
                    gpuPct: { type: number }
                hardwareDensityScore:
                  type: number
                  description: "Relative compute density score"
                estimatedPUE:
                  type: number
                  description: "Reserved for future rack-topology-aware extensions. Not used in scoring. Estimated Power Usage Effectiveness (1.05-1.40)"
                controlStatus:
                  type: object
                  description: "Control feedback from the agent"
                  properties:
                    cpu:
                      type: object
                      properties:
                        backend: { type: string }
                        result: { type: string }
                        message: { type: string }
                        updatedAt: { type: string }
                    gpu:
                      type: object
                      properties:
                        backend: { type: string }
                        result: { type: string }
                        message: { type: string }
                        updatedAt: { type: string }
                lastUpdated: { type: string }
      additionalPrinterColumns:
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: Profile
          type: string
          jsonPath: .spec.profile
        - name: Class
          type: string
          jsonPath: .status.schedulableClass
        - name: PowerHeadroom
          type: number
          jsonPath: .status.predictedPowerHeadroomScore
        - name: CoolingStress
          type: number
          jsonPath: .status.predictedCoolingStressScore
        - name: PSUStress
          type: number
          jsonPath: .status.predictedPsuStressScore
        - name: CPU-Cap
          type: string
          jsonPath: .spec.cpu.packagePowerCapPctOfMax
        - name: Draining
          type: boolean
          jsonPath: .spec.scheduling.draining
      subresources:
        status: {}
